methodology_summary: 
  "The project follows a modular six-stage pipeline to evaluate and rank candidates efficiently.
  Ingestion: Candidate profiles are loaded from a JSON Lines (.jsonl) file.
  Quality Filtering: Profiles are checked for inconsistencies such as skill inflation, unrealistic work experience, education and experience mismatches, and overlapping full-time jobs. Profiles that fail these checks are removed.
  Scoring: Each valid candidate is assigned a score based on three factors: Career (45%), Skills (30%), and Experience (25%). The final score is adjusted using deployment bonuses and location or behavioral multipliers.
  Ranking: Candidates are sorted in descending order of their final score. If two candidates have the same score, the candidate ID is used as the tie-breaker in ascending order.
  Reason Generation: A two-sentence explanation is created for every ranked candidate using predefined templates. This ensures that all justifications are based only on available profile information.
  Export and Validation: The top 100 ranked candidates are exported to a CSV file. A validation step then checks the output for the correct schema, unique candidate IDs, proper ranking order, and consistent score ordering."

